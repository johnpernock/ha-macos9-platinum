views:
  - title: Mac OS 9
    path: mac-os-9
    icon: phu:imac
    type: panel
    background: '#008080'
    cards:
      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: 1fr
          grid-template-rows: 38px 1fr
          grid-template-areas: |
            "header"
            "main"
          margin: 0
          padding: 0
        cards:
          - type: custom:button-card
            view_layout:
              grid-area: header
            name: File  Edit  View  Special
            icon: mdi:apple
            custom_fields:
              clock: >
                [[[ return states['sensor.time'] ? states['sensor.time'].state :
                '12:00' ]]]
            styles:
              card:
                - height: 38px
                - background-color: '#dddddd'
                - border-radius: 0px
                - border-bottom: '2px solid #000'
                - padding: 0px 20px
              grid:
                - grid-template-areas: '"i n clock"'
                - grid-template-columns: 35px 1fr 120px
              icon:
                - width: 24px
                - color: '#000'
              name:
                - justify-self: start
                - font-weight: bold
                - font-size: 16px
                - color: '#000'
              custom_fields:
                clock:
                  - justify-self: end
                  - font-weight: bold
                  - font-size: 16px
                  - color: '#000'
          - type: custom:layout-card
            view_layout:
              grid-area: main
            layout_type: custom:grid-layout
            layout:
              grid-template-columns: 60px 1fr 160px
              grid-template-areas: |
                "strip desktop icons"
              height: calc(100vh - 38px)
            cards:
              - type: custom:stack-in-card
                view_layout:
                  grid-area: strip
                mode: vertical
                card_mod:
                  style: |
                    ha-card { 
                      background: #ddd !important; 
                      border: 2px solid #666 !important;
                      border-top: 2px solid #fff !important;
                      border-left: 2px solid #fff !important;
                      border-radius: 0px 12px 12px 0px !important; 
                      width: 52px !important; 
                      margin-top: 100px !important;
                      box-shadow: 6px 6px 15px rgba(0,0,0,0.4) !important;
                    }
                cards:
                  - type: custom:button-card
                    name: '|||'
                    styles:
                      card:
                        - height: 20px
                        - background: '#bbb'
                        - border-bottom: '2px solid #888'
                        - border-radius: 0px
                      name:
                        - font-size: 12px
                        - color: '#444'
                        - transform: rotate(90deg)
                        - font-weight: bold
                  - type: custom:button-card
                    icon: mdi:volume-high
                    styles:
                      card:
                        - height: 48px
                        - background: transparent
                        - border: none
                      icon:
                        - width: 28px
                        - color: '#000'
                  - type: custom:button-card
                    icon: mdi:monitor
                    styles:
                      card:
                        - height: 48px
                        - background: transparent
                        - border: none
                      icon:
                        - width: 28px
                        - color: '#000'
                  - type: custom:button-card
                    icon: mdi:note-text
                    tap_action:
                      action: call-service
                      service: input_boolean.toggle
                      service_data:
                        entity_id: input_boolean.macos_notepad
                    styles:
                      card:
                        - height: 48px
                        - background: transparent
                        - border: none
                      icon:
                        - width: 28px
                        - color: '#000'
              - type: conditional
                view_layout:
                  grid-area: desktop
                  place-self: center
                conditions:
                  - entity: input_boolean.macos_notepad
                    state: 'on'
                card:
                  type: custom:button-card
                  name: Project Notes
                  label: |
                    • Finish isometric house model<br/>
                    • Add Vornado fan to bedroom<br/>
                    • Check SEC tournament scores
                  show_label: true
                  styles:
                    card:
                      - background-color: '#ffff99 !important'
                      - color: '#000 !important'
                      - border: '1px solid #cccc00 !important'
                      - width: 280px
                      - height: auto
                      - padding: 20px
                      - border-radius: 0px
                      - box-shadow: 10px 10px 25px rgba(0,0,0,0.3) !important
                    name:
                      - justify-self: start
                      - font-weight: bold
                      - font-size: 18px
                      - color: '#000 !important'
                      - border-bottom: '2px solid #000 !important'
                      - width: 100%
                      - text-align: left
                      - margin-bottom: 10px
                    label:
                      - justify-self: start
                      - text-align: left
                      - font-family: '''Courier New'', Courier, monospace'
                      - font-size: 14px
                      - color: '#000 !important'
                      - line-height: '1.6'
              - type: custom:layout-card
                view_layout:
                  grid-area: icons
                layout_type: custom:grid-layout
                layout:
                  grid-template-columns: 1fr
                  grid-template-rows: 1fr 1fr
                  grid-template-areas: |
                    "top"
                    "bottom"
                  height: 100%
                cards:
                  - type: custom:button-card
                    view_layout:
                      grid-area: top
                    name: Macintosh HD
                    icon: mdi:harddisk
                    styles:
                      card:
                        - background: transparent
                        - border: none
                        - box-shadow: none
                        - margin-top: 40px
                        - justify-self: center
                      icon:
                        - width: 72px
                        - color: '#c0c0c0'
                      name:
                        - background-color: '#fff !important'
                        - border: '2px solid #000'
                        - font-size: 14px
                        - font-weight: bold
                        - color: '#000 !important'
                        - padding: 2px 8px
                  - type: custom:button-card
                    view_layout:
                      grid-area: bottom
                    name: Trash
                    icon: mdi:trash-can-outline
                    styles:
                      card:
                        - background: transparent
                        - border: none
                        - box-shadow: none
                        - align-self: end
                        - margin-bottom: 40px
                        - justify-self: center
                      icon:
                        - width: 72px
                        - color: '#000 !important'
                      name:
                        - background-color: '#fff !important'
                        - border: '2px solid #000'
                        - font-size: 14px
                        - font-weight: bold
                        - color: '#000 !important'
                        - padding: 2px 8px
